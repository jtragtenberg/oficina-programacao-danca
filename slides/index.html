<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Introdução à Programação Através da Dança</title>
<style>
  :root { --bg: #fff; --fg: #111; --dim: #999; --border: #ddd; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Menlo', 'Courier New', monospace; background: var(--bg); color: var(--fg); padding: 3rem; }
  .pre  { font-size: .65em; color: var(--dim); margin-bottom: 1.5rem; letter-spacing: .1em; }
  h1    { font-size: 1.6em; font-weight: normal; line-height: 1.2; margin-bottom: 3rem; }
  ul    { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
  li a  { display: flex; align-items: baseline; gap: 1rem; text-decoration: none; color: var(--fg); padding: .8rem 1rem; border: 1px solid var(--border); transition: background .15s; }
  li a:hover { background: #f5f5f5; }
  li a .num  { font-size: .6em; color: var(--dim); min-width: 3em; }
  li a .name { font-size: .9em; }
</style>
</head>
<body>
  <div class="pre">// Introdução à Programação Através da Dança</div>
  <h1>João Tragtenberg<br>&amp; Iara Izidoro</h1>
  <ul>
    <li>

        <span class="num">dia 1</span>
        <span class="name">Apresentação sobre meu trabalho</span>
      </a>
    </li>
    <li>
      <a href="dia2-apresentacao.html">
        <span class="num">dia 2</span>
        <span class="name">Corpo, Giromin e Programação</span>
      </a>
    </li>
    <li>
      <a href="dia3-apresentacao.html">
        <span class="num">dia 3</span>
        <span class="name">Do Sensor ao Som</span>
      </a>
    </li>
    <li>
      <a href="dia6-apresentacao.html">
        <span class="num">dia 6</span>
        <span class="name">Giromin completo</span>
      </a>
    </li>
  </ul>
</body>
</html>
